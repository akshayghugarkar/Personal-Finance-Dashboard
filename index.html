<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard - India</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --grad-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --grad-danger: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --grad-warning: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --grad-info: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --grad-dark: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            --grad-pink: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --grad-orange: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            --grad-green: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --grad-purple: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            --bg-primary: #0f0f23;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(255, 255, 255, 0.05);
            --text-primary: #fff;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            --glow: 0 0 20px rgba(102, 126, 234, 0.5);
            --radius: 12px;
            --radius-lg: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(74, 172, 254, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: bgShift 20s ease infinite;
        }

        @keyframes bgShift { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
        }

        .gradient-text {
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-gap { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }

        .dashboard { max-width: 1600px; margin: 0 auto; padding: 30px; }

        /* Header */
        .header {
            padding: 25px 40px;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header h1 i { font-size: 36px; }

        /* Month Selector */
        .month-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 15px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .month-selector button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 16px;
        }

        .month-selector button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .month-selector .current-month {
            font: 600 16px 'Inter', sans-serif;
            color: var(--text-primary);
            min-width: 150px;
            text-align: center;
        }

        .month-selector input[type="month"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font: 600 16px 'Inter', sans-serif;
            cursor: pointer;
            padding: 5px;
        }

        .month-selector input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        /* Month Badge */
        .month-badge {
            background: var(--grad-primary);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font: 600 12px 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font: 600 14px 'Inter', sans-serif;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before { left: 100%; }
        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: var(--grad-primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover { box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6); }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font: 600 12px 'Inter', sans-serif;
            transition: var(--transition);
        }

        .btn-edit { background: var(--grad-success); color: #fff; }
        .btn-delete { background: var(--grad-danger); color: #fff; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            animation: fadeIn 0.3s ease;
        }

        .modal.active { display: flex; justify-content: center; align-items: center; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow), var(--glow);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header { margin-bottom: 30px; }
        .modal-header h2 { font-size: 24px; font-weight: 700; }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 28px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .form-group { margin-bottom: 25px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font: 600 14px/1 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .filter-select {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            font: 15px 'Inter', sans-serif;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .filter-select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder { color: var(--text-secondary); }
        .form-actions { display: flex; gap: 15px; margin-top: 30px; }
        .form-actions button { flex: 1; }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .kpi-card {
            padding: 30px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease both;
        }

        .kpi-card:nth-child(1) { animation-delay: 0.1s; }
        .kpi-card:nth-child(2) { animation-delay: 0.2s; }
        .kpi-card:nth-child(3) { animation-delay: 0.3s; }
        .kpi-card:nth-child(4) { animation-delay: 0.4s; }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--grad-primary);
            transform: scaleX(0);
            transition: transform 0.4s;
        }

        .kpi-card:hover::before { transform: scaleX(1); }

        .kpi-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow), var(--glow);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .kpi-header { margin-bottom: 20px; }

        .kpi-title {
            color: var(--text-secondary);
            font: 600 13px/1 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            font-size: 26px;
            animation: float 3s ease-in-out infinite;
        }

        .icon-balance { background: var(--grad-primary); box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3); }
        .icon-income { background: var(--grad-success); box-shadow: 0 8px 16px rgba(79, 172, 254, 0.3); }
        .icon-expense { background: var(--grad-danger); box-shadow: 0 8px 16px rgba(250, 112, 154, 0.3); }
        .icon-savings { background: var(--grad-dark); box-shadow: 0 8px 16px rgba(48, 207, 208, 0.3); }

        .kpi-value {
            font: 800 36px/1 'Inter', sans-serif;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a0a0b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .kpi-subtitle {
            color: var(--text-secondary);
            font: 500 13px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .trend-up { color: #00f2fe; font-weight: 600; }
        .trend-down { color: #fee140; font-weight: 600; }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-container { padding: 30px; animation: fadeInUp 0.8s ease; }

        .chart-header {
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .chart-title {
            font: 700 20px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title i { background: var(--grad-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .time-filter {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .time-filter button {
            padding: 8px 18px;
            border: none;
            background: transparent;
            border-radius: 10px;
            cursor: pointer;
            font: 600 13px 'Inter', sans-serif;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .time-filter button.active {
            background: var(--grad-primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .time-filter button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .insight-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .insight-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(10px);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .insight-item:last-child { margin-bottom: 0; }

        .insight-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            flex-shrink: 0;
            font-size: 20px;
        }

        .insight-content h4 { font-size: 16px; margin-bottom: 8px; }
        .insight-content p { color: var(--text-secondary); font-size: 14px; line-height: 1.6; }

        .goals-container { padding: 30px; margin-bottom: 40px; animation: fadeInUp 1.2s ease; }

        .goal-item {
            margin-bottom: 28px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
        }

        .goal-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .goal-item:last-child { margin-bottom: 0; }
        .goal-header { margin-bottom: 12px; }
        .goal-name { font: 600 15px 'Inter', sans-serif; display: flex; align-items: center; gap: 12px; }
        .goal-amount { font: 500 14px 'Inter', sans-serif; color: var(--text-secondary); }

        .progress-bar {
            height: 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .progress-fill {
            height: 100%;
            background: var(--grad-success);
            border-radius: 20px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .table-container {
            padding: 30px;
            margin-bottom: 40px;
            overflow-x: auto;
            animation: fadeInUp 1.4s ease;
        }

        .table-controls { margin-bottom: 25px; gap: 15px; flex-wrap: wrap; }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 250px;
            max-width: 450px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 45px 12px 20px;
        }

        .search-box input::placeholder { color: var(--text-secondary); }

        .search-box i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        .filter-select { width: auto; padding: 12px 18px; cursor: pointer; }

        table { width: 100%; border-collapse: collapse; }
        thead { background: rgba(255, 255, 255, 0.03); }

        th {
            padding: 16px;
            text-align: left;
            font: 700 12px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 18px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        tr:hover { background: rgba(255, 255, 255, 0.03); }

        .transaction-type {
            padding: 6px 14px;
            border-radius: 20px;
            font: 600 12px 'Inter', sans-serif;
            display: inline-block;
        }

        .type-income { background: var(--grad-success); color: #fff; }
        .type-expense { background: var(--grad-danger); color: #fff; }
        .amount-income { color: #00f2fe; font-weight: 700; }
        .amount-expense { color: #fee140; font-weight: 700; }

        .budget-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .budget-card {
            padding: 25px;
            transition: var(--transition);
        }

        .budget-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow), var(--glow);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .budget-header { margin-bottom: 18px; }
        .budget-category { display: flex; align-items: center; gap: 12px; font: 600 15px 'Inter', sans-serif; }

        .category-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            font-size: 20px;
        }

        .budget-status {
            font: 600 12px 'Inter', sans-serif;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .status-good { background: var(--grad-success); color: #fff; }
        .status-warning { background: var(--grad-warning); color: #8b4513; }
        .status-over { background: var(--grad-danger); color: #fff; }

        .budget-amounts { margin-bottom: 12px; font: 500 14px 'Inter', sans-serif; }
        .budget-spent { font-weight: 700; }
        .budget-total { color: var(--text-secondary); }

        .action-buttons { display: flex; gap: 8px; }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 20px 25px;
            display: none;
            gap: 15px;
            z-index: 2000;
            animation: slideInRight 0.3s ease;
        }

        .toast.show { display: flex; }

        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            font-size: 20px;
        }

        .toast-success { background: var(--grad-success); }
        .toast-message { font-weight: 600; }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
            opacity: 0.5;
        }

        /* Month History */
        .history-section {
            margin-bottom: 40px;
        }

        .month-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .month-card {
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }

        .month-card:hover {
            transform: translateY(-5px);
            border-color: rgba(102, 126, 234, 0.5);
        }

        .month-card.active {
            border-color: #667eea;
            box-shadow: var(--glow);
        }

        .month-card h4 {
            font-size: 16px;
            margin-bottom: 10px;
        }

        .month-card .amount {
            font: 700 20px 'Inter', sans-serif;
        }

        .month-card .amount.positive { color: #00f2fe; }
        .month-card .amount.negative { color: #fee140; }

        /* Summary Stats */
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }

        .summary-row:last-child { border: none; }
        .summary-row .label { color: var(--text-secondary); }
        .summary-row .value { font-weight: 600; }

        @media (max-width: 768px) {
            .dashboard { padding: 20px 15px; }
            .header { padding: 20px; flex-direction: column; gap: 20px; }
            .header h1 { font-size: 24px; }
            .kpi-grid, .chart-grid, .budget-grid { grid-template-columns: 1fr; }
            .kpi-value { font-size: 28px; }
            table { font-size: 12px; }
            th, td { padding: 12px 10px; }
            .modal-content { width: 95%; padding: 25px; }
            .month-selector { width: 100%; justify-content: center; }
        }

        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--grad-primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Header -->
        <header class="header glass flex-between">
            <h1 class="gradient-text"><i class="fas fa-chart-line gradient-text"></i>Personal Finance Dashboard</h1>
            
            <!-- Month Selector -->
            <div class="month-selector">
                <button onclick="changeMonth(-1)" title="Previous Month"><i class="fas fa-chevron-left"></i></button>
                <input type="month" id="monthPicker" onchange="onMonthChange()">
                <button onclick="changeMonth(1)" title="Next Month"><i class="fas fa-chevron-right"></i></button>
                <button onclick="goToCurrentMonth()" class="btn btn-sm btn-secondary" title="Go to Current Month">
                    <i class="fas fa-calendar-day"></i> Today
                </button>
            </div>
            
            <div class="flex-gap">
                <button class="btn btn-secondary" onclick="exportReport()"><i class="fas fa-download"></i>Export</button>
                <button class="btn btn-primary" onclick="openModal('transaction')"><i class="fas fa-plus"></i>Add Transaction</button>
            </div>
        </header>

        <!-- Current Month Display -->
        <div style="text-align:center;margin-bottom:30px;">
            <span class="month-badge" id="currentMonthBadge">

// Firebase Config

// ==================== DATA ====================
const budgetData = [

// ==================== HELPERS ====================
const formatCurrency = n => `₹${n.toLocaleString('en-IN')}`;

const formatMonthYear = (monthStr) => {

};

const getMonthFromDate = (dateStr) => dateStr.slice(0, 7); // "2025-01-15" -> "2025-01"

const getDaysInMonth = (monthStr) => {
    const [year, month] = monthStr.split('-').map(Number);
    return new Date(year, month, 0).getDate();
};

// ==================== MONTH NAVIGATION ====================
window.changeMonth = (delta) => {
    const [year, month] = selectedMonth.split('-').map(Number);
    const newDate = new Date(year, month - 1 + delta, 1);
    selectedMonth = newDate.toISOString().slice(0, 7);
    $('monthPicker').value = selectedMonth;

};

window.onMonthChange = () => {

// ==================== RENDER KPIs ====================
function renderKPIs(income, expense, prevIncome, prevExpense) {
    const savings = income - expense;
    const rate = income > 0 ? Math.round((savings / income) * 100) : 0;
    
    // Calculate trends
    const incomeTrend = prevIncome > 0 ? Math.round(((income - prevIncome) / prevIncome) * 100) : 0;
    const expenseTrend = prevExpense > 0 ? Math.round(((expense - prevExpense) / prevExpense) * 100) : 0;
    
    const kpiData = [
        { 
            id: 'totalBalance', title: 'Total Balance', icon: 'fa-wallet', class: 'icon-balance',
            value: formatCurrency(savings),
            subtitle: savings >= 0 ? '💰 Healthy Balance' : '⚠️ Negative Balance'
        },
        { 
            id: 'monthlyIncome', title: 'Monthly Income', icon: 'fa-arrow-down', class: 'icon-income',
            value: formatCurrency(income),
            trend: incomeTrend >= 0 ? 'up' : 'down',
            percent: `${Math.abs(incomeTrend)}%`
        },
        { 
            id: 'monthlyExpenses', title: 'Monthly Expenses', icon: 'fa-arrow-up', class: 'icon-expense',
            value: formatCurrency(expense),
            trend: expenseTrend <= 0 ? 'up' : 'down', // Lower expense is good
            percent: `${Math.abs(expenseTrend)}%`
        },
        { 
            id: 'monthlySavings', title: 'Monthly Savings', icon: 'fa-piggy-bank', class: 'icon-savings',
            value: formatCurrency(savings),
            subtitle: `Savings Rate: <strong>${rate}%</strong>`
        }
    ];

    $('kpiGrid').innerHTML = kpiData.map(k => `
        <div class="kpi-card glass">
            <div class="kpi-header flex-between">
                <div class="kpi-title">${k.title}</div>
                <div class="kpi-icon ${k.class} flex-center"><i class="fas ${k.icon}"></i></div>
            </div>
            <div class="kpi-value">${k.value}</div>
            <div class="kpi-subtitle">
                ${k.subtitle ? `<span>${k.subtitle}</span>` : 
                `<span class="trend-${k.trend}"><i class="fas fa-arrow-${k.trend}"></i> ${k.percent}</span><span>vs last month</span>`}
            </div>
        </div>
    `).join('');
}

// ==================== RENDER INSIGHTS ====================
function renderInsights(monthlyData) {
    const { income, expense, spentByCategory } = monthlyData;
    const savings = income - expense;
    const topCategory = Object.entries(spentByCategory).sort((a, b) => b[1] - a[1])[0];
    
    const insights = [
        {
            icon: topCategory ? 'fa-chart-bar' : 'fa-info-circle',
            bg: 'var(--grad-warning)',
            color: '#8b4513',
            title: topCategory ? `Top Expense: ${topCategory[0]}` : 'No Expenses Yet',
            text: topCategory ? `You spent ${formatCurrency(topCategory[1])} on ${topCategory[0]} this month.` : 'Start tracking your expenses to get insights!'
        },
        {
            icon: savings >= 0 ? 'fa-thumbs-up' : 'fa-exclamation-triangle',
            bg: savings >= 0 ? 'var(--grad-success)' : 'var(--grad-danger)',
            color: 'white',
            title: savings >= 0 ? 'Great Savings!' : 'Overspending Alert!',
            text: savings >= 0 ? `You saved ${formatCurrency(savings)} this month. Keep it up! 💪` : `You're ${formatCurrency(Math.abs(savings))} over budget. Review your expenses.`
        },
        {
            icon: 'fa-lightbulb',
            bg: 'var(--grad-primary)',
            color: 'white',
            title: 'Smart Tip',
            text: income > 0 ? `Your savings rate is ${Math.round((savings/income)*100)}%. Aim for at least 20%!` : 'Add your income to track savings rate.'
        }
    ];
    
    $('insightsContainer').innerHTML = insights.map(i => `
        <div class="insight-item">
            <div class="insight-icon flex-center" style="background:${i.bg}">
                <i class="fas ${i.icon}" style="color:${i.color}"></i>
            </div>
            <div class="insight-content"><h4>${i.title}</h4><p>${i.text}</p></div>
        </div>
    `).join('');
}

// ==================== RENDER BUDGETS ====================
function renderBudgets(spentByCategory) {
    $('budgetMonth').textContent = formatMonthYear(selectedMonth);
    
    $('budgetGrid').innerHTML = budgetData.map(b => {
        const spent = spentByCategory[b.name] || 0;
        const percent = b.budget > 0 ? Math.round((spent / b.budget) * 100) : 0;
        const status = percent > 100 ? 'over' : percent > 80 ? 'warning' : 'good';
        const fillBg = status === 'over' ? 'var(--grad-danger)' : status === 'warning' ? 'var(--grad-warning)' : 'var(--grad-success)';
        const remaining = b.budget - spent;
        
        return `
            <div class="budget-card glass">
                <div class="budget-header flex-between">
                    <div class="budget-category">
                        <div class="category-icon flex-center" style="background:${b.bg}">
                            <i class="fas ${b.icon}" style="color:${b.iconColor || 'white'}"></i>
                        </div>${b.name}
                    </div>
                    <div class="budget-status status-${status}">${percent}%</div>
                </div>
                <div class="budget-amounts flex-between">
                    <span class="budget-spent">${formatCurrency(spent)}</span>
                    <span class="budget-total">/ ${formatCurrency(b.budget)}</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:${Math.min(percent, 100)}%;background:${fillBg}"></div>
                </div>
                <div style="margin-top:8px;font-size:12px;color:${remaining >= 0 ? '#00f2fe' : '#fee140'}">
                    ${remaining >= 0 ? `₹${remaining.toLocaleString('en-IN')} remaining` : `₹${Math.abs(remaining).toLocaleString('en-IN')} over budget!`}
                </div>

        `;
    }).join('');
}

// ==================== LOAD & FILTER TRANSACTIONS ====================
async function loadAllTransactions() {
    const snapshot = await getDocs(collection(db, "transactions"));
    allTransactions = [];
    snapshot.forEach(d => allTransactions.push({ id: d.id, ...d.data() }));
    allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
}

function getMonthlyTransactions(monthStr) {
    return allTransactions.filter(t => getMonthFromDate(t.date) === monthStr);
}

function calculateMonthlyData(transactions) {
    let income = 0, expense = 0;
    const spentByCategory = {};
    const dailyData = {};
    
    transactions.forEach(t => {
        if (t.type === 'income') {
            income += t.amount;
        } else {
            expense += t.amount;
            spentByCategory[t.category] = (spentByCategory[t.category] || 0) + t.amount;
        }
        
        // Daily data
        const day = parseInt(t.date.split('-')[2]);
        if (!dailyData[day]) dailyData[day] = { income: 0, expense: 0 };
        dailyData[day][t.type] += t.amount;
    });
    
    return { income, expense, spentByCategory, dailyData };
}

// ==================== RENDER TRANSACTIONS TABLE ====================
function renderTransactions(transactions) {
    const tbody = $('transactionBody');
    $('tableMonth').textContent = formatMonthYear(selectedMonth);
    
    if (transactions.length === 0) {
        tbody.innerHTML = `
            <tr>
                <td colspan="6" class="no-data">
                    <i class="fas fa-receipt"></i>
                    No transactions for ${formatMonthYear(selectedMonth)}
                </td>
            </tr>
        `;
        return;
    }
    
    tbody.innerHTML = transactions.map(t => `
        <tr>
            <td>${t.date}</td>
            <td>${t.description}</td>
            <td>${t.category}</td>
            <td><span class="transaction-type type-${t.type}">${t.type}</span></td>
            <td class="amount-${t.type}">${formatCurrency(t.amount)}</td>
            <td><button class="action-btn btn-delete" onclick="deleteTx('${t.id}')">Delete</button></td>
        </tr>
    `).join('');
}

// ==================== MONTH HISTORY ====================
async function loadAllMonthsHistory() {
    const monthsData = {};
    
    allTransactions.forEach(t => {
        const month = getMonthFromDate(t.date);
        if (!monthsData[month]) monthsData[month] = { income: 0, expense: 0 };
        monthsData[month][t.type] += t.amount;
    });
    
    const sortedMonths = Object.keys(monthsData).sort().reverse();
    
    if (sortedMonths.length === 0) {
        $('monthHistory').innerHTML = `
            <div class="no-data">
                <i class="fas fa-calendar-times"></i>
                No historical data yet. Start adding transactions!
            </div>
        `;
        return;
    }
    
    $('monthHistory').innerHTML = sortedMonths.map(month => {
        const data = monthsData[month];
        const balance = data.income - data.expense;
        const isActive = month === selectedMonth;
        
        return `
            <div class="month-card glass ${isActive ? 'active' : ''}" onclick="selectMonth('${month}')">
                <h4>${formatMonthYear(month)}</h4>
                <div class="summary-row">
                    <span class="label">Income</span>
                    <span class="value" style="color:#00f2fe">${formatCurrency(data.income)}</span>
                </div>
                <div class="summary-row">
                    <span class="label">Expense</span>
                    <span class="value" style="color:#fee140">${formatCurrency(data.expense)}</span>
                </div>
                <div class="amount ${balance >= 0 ? 'positive' : 'negative'}">
                    ${balance >= 0 ? '+' : ''}${formatCurrency(balance)}
                </div>
            </div>
        `;
    }).join('');
}

// ==================== CHARTS ====================
function updateCharts(monthlyData) {
    const { spentByCategory, dailyData } = monthlyData;
    
    // Expense Breakdown Chart
    const categories = Object.keys(spentByCategory);
    const amounts = Object.values(spentByCategory);
    const colors = categories.map(cat => colorMap[cat] || '#a0a0b8');
    
    if (expenseChart) {
        if (categories.length > 0) {
            expenseChart.data.labels = categories;
            expenseChart.data.datasets[0].data = amounts;
            expenseChart.data.datasets[0].backgroundColor = colors;
        } else {
            expenseChart.data.labels = ['No Expenses'];
            expenseChart.data.datasets[0].data = [1];
            expenseChart.data.datasets[0].backgroundColor = ['rgba(160, 160, 184, 0.3)'];
        }
        expenseChart.update();
    }
    
    // Daily Chart
    const daysInMonth = getDaysInMonth(selectedMonth);
    const dayLabels = Array.from({ length: daysInMonth }, (_, i) => i + 1);
    const incomeData = dayLabels.map(d => dailyData[d]?.income || 0);
    const expenseData = dayLabels.map(d => dailyData[d]?.expense || 0);
    
    if (dailyChart) {
        dailyChart.data.labels = dayLabels;
        dailyChart.data.datasets[0].data = incomeData;
        dailyChart.data.datasets[1].data = expenseData;
        dailyChart.update();
    }
}

function initCharts() {
    const chartOptions = {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { labels: { color: '#a0a0b8', font: { family: 'Inter' } } } }
    };

    dailyChart = new Chart($('dailyChart'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                { label: 'Income', data: [], backgroundColor: 'rgba(79, 172, 254, 0.8)', borderRadius: 4 },
                { label: 'Expenses', data: [], backgroundColor: 'rgba(250, 112, 154, 0.8)', borderRadius: 4 }
            ]
        },
        options: { 
            ...chartOptions, 
            scales: { 
                x: { ticks: { color: '#a0a0b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }, 
                y: { ticks: { color: '#a0a0b8' }, grid: { color: 'rgba(255,255,255,0.05)' } } 
            } 
        }
    });

    expenseChart = new Chart($('expenseBreakdownChart'), {
        type: 'doughnut',
        data: {
            labels: ['No Data'],
            datasets: [{ data: [1], backgroundColor: ['rgba(160, 160, 184, 0.3)'], borderWidth: 0 }]
        },
        options: { ...chartOptions, cutout: '65%' }
    });
}

// ==================== GOALS ====================
async function loadGoals() {
    const snapshot = await getDocs(collection(db, "goals"));
    const container = $('goalsContainer');
    
    container.innerHTML = `
        <div class="chart-header flex-between">
            <h3 class="chart-title"><i class="fas fa-bullseye"></i> Savings Goals</h3>
            <button class="btn btn-primary" onclick="openModal('goal')"><i class="fas fa-plus"></i>Add Goal</button>
        </div>
    `;
    
    if (snapshot.empty) {
        container.innerHTML += `<div class="no-data"><i class="fas fa-flag-checkered"></i>No goals yet. Set your first savings goal!</div>`;
        return;
    }
    
    snapshot.forEach(d => {
        const g = d.data();
        const percent = Math.round((g.saved / g.target) * 100);
        
        container.innerHTML += `
            <div class="goal-item">
                <div class="goal-header flex-between">
                    <div class="goal-name"><i class="fas fa-flag" style="color:#667eea"></i>${g.name}</div>
                    <div class="goal-amount">${formatCurrency(g.saved)} / ${formatCurrency(g.target)}</div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(percent, 100)}%"></div></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                    <span style="font-size:12px;color:var(--text-secondary)">${percent >= 100 ? 'Completed! 🎉' : `${percent}% complete`}</span>
                    <div class="action-buttons">
                        <button class="action-btn btn-edit" onclick="editGoal('${d.id}','${g.name}',${g.target},${g.saved})">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteGoal('${d.id}')">Delete</button>
                    </div>
                </div>
            </div>
        `;
    });
}

// ==================== REFRESH ALL DATA ====================
async function refreshAll() {
    // Update UI displays
    $('currentMonthDisplay').textContent = formatMonthYear(selectedMonth);
    
    // Get current month's transactions
    const currentMonthTxns = getMonthlyTransactions(selectedMonth);
    const currentData = calculateMonthlyData(currentMonthTxns);
    
    // Get previous month's data for comparison
    const [year, month] = selectedMonth.split('-').map(Number);
    const prevDate = new Date(year, month - 2, 1);
    const prevMonth = prevDate.toISOString().slice(0, 7);
    const prevMonthTxns = getMonthlyTransactions(prevMonth);
    const prevData = calculateMonthlyData(prevMonthTxns);
    
    // Render everything
    renderKPIs(currentData.income, currentData.expense, prevData.income, prevData.expense);
    renderBudgets(currentData.spentByCategory);
    renderTransactions(currentMonthTxns);
    renderInsights(currentData);
    updateCharts(currentData);
    loadAllMonthsHistory();
}

// ==================== EVENT HANDLERS ====================
window.openModal = type => $(`${type}Modal`).classList.add('active');
window.closeModal = type => $(`${type}Modal`).classList.remove('active');

window.showToast = msg => {
    const toast = $('toast');
    toast.querySelector('.toast-message').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
};

window.deleteTx = async id => {
    if (!confirm('Delete this transaction?')) return;
    await deleteDoc(doc(db, "transactions", id));
    showToast("🗑️ Transaction Deleted!");
    await loadAllTransactions();
    refreshAll();
};

window.deleteGoal = async id => {
    if (!confirm('Delete this goal?')) return;
    await deleteDoc(doc(db, "goals", id));
    showToast("🗑️ Goal Deleted!");
    loadGoals();
};

window.editGoal = async (id, name, target, saved) => {
    const newName = prompt("Goal Name:", name);
    if (!newName) return;
    const newTarget = prompt("Target Amount:", target);
    const newSaved = prompt("Saved Amount:", saved);
    if (!newTarget || !newSaved) return;
    
    await updateDoc(doc(db, "goals", id), {
        name: newName,
        target: parseInt(newTarget),
        saved: parseInt(newSaved)
    });
    showToast("✅ Goal Updated!");
    loadGoals();
};

window.exportReport = () => {
    const monthTxns = getMonthlyTransactions(selectedMonth);
    const rows = [['Date', 'Description', 'Category', 'Type', 'Amount']];
    monthTxns.forEach(t => rows.push([t.date, t.description, t.category, t.type, t.amount]));
    
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `finance-report-${selectedMonth}.csv`;
    a.click();
    showToast(`📊 Report for ${formatMonthYear(selectedMonth)} downloaded!`);
};

// Form Submissions
$('transactionForm').onsubmit = async e => {
    e.preventDefault();
    
    const txData = {
        date: $('txDate').value,
        description: $('txDesc').value,
        category: $('txCategory').value,
        type: $('txType').value,
        amount: parseInt($('txAmount').value),
        createdAt: new Date().toISOString()
    };
    
    await addDoc(collection(db, "transactions"), txData);
    closeModal('transaction');
    $('transactionForm').reset();
    $('txDate').valueAsDate = new Date();
    showToast("✅ Transaction Added!");
    
    await loadAllTransactions();
    
    // Switch to the month of the new transaction
    const txMonth = getMonthFromDate(txData.date);
    if (txMonth !== selectedMonth) {
        selectedMonth = txMonth;
        $('monthPicker').value = selectedMonth;
    }
    
    refreshAll();
};

$('goalForm').onsubmit = async e => {
    e.preventDefault();
    await addDoc(collection(db, "goals"), {
        name: $('goalName').value,
        target: parseInt($('goalTarget').value),
        saved: parseInt($('goalSaved').value),
        createdAt: new Date().toISOString()
    });
    closeModal('goal');
    $('goalForm').reset();
    showToast("🎯 Goal Added!");
    loadGoals();
};

// Filters
$('searchInput').oninput = filterTable;
$('categoryFilter').onchange = filterTable;
$('typeFilter').onchange = filterTable;

function filterTable() {
    const search = $('searchInput').value.toLowerCase();
    const cat = $('categoryFilter').value;
    const type = $('typeFilter').value;
    
    document.querySelectorAll('#transactionBody tr').forEach(row => {
        if (row.cells.length < 5) return;
        
        const text = row.textContent.toLowerCase();
        const rowCat = row.cells[2].textContent;
        const rowType = row.cells[3].textContent.trim().toLowerCase();
        
        const matchSearch = text.includes(search);
        const matchCat = cat === 'all' || rowCat === cat;
        const matchType = type === 'all' || rowType === type;
        
        row.style.display = matchSearch && matchCat && matchType ? '' : 'none';
    });
}

// ==================== INIT ====================
window.onload = async () => {
    // Set month picker to current month
    $('monthPicker').value = selectedMonth;
    $('txDate').valueAsDate = new Date();
    
    // Initialize charts
    initCharts();
    
    // Load all data
    await loadAllTransactions();
    refreshAll();
    loadGoals();
    
    showToast(`📅 Viewing ${formatMonthYear(selectedMonth)}`);
};
</script>
</body>

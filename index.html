<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --grad-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --grad-danger: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --grad-warning: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --grad-info: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --grad-dark: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            --grad-pink: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --grad-orange: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            --grad-green: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --grad-purple: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            --grad-gold: linear-gradient(135deg, #f7971e 0%, #ffd200 100%);
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #fff;
            --text-secondary: #8a8aa3;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glow: 0 0 30px rgba(102, 126, 234, 0.3);
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(118, 75, 162, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .gradient-text {
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-gap { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

        .dashboard { max-width: 1500px; margin: 0 auto; padding: 24px; }

        .header {
            padding: 16px 24px;
            margin-bottom: 20px;
            animation: slideDown 0.5s ease;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i { font-size: 24px; }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .month-selector button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: var(--transition);
            font-size: 11px;
        }

        .month-selector button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .month-selector input[type="month"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font: 600 12px 'Inter', sans-serif;
            cursor: pointer;
        }

        .month-selector input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font: 600 12px 'Inter', sans-serif;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: var(--grad-primary);
            color: #fff;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-sm { padding: 5px 10px; font-size: 10px; }
        .btn-xs { padding: 3px 6px; font-size: 9px; border-radius: 5px; }

        .action-btn {
            padding: 4px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font: 600 9px 'Inter', sans-serif;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-edit { background: var(--grad-success); color: #fff; }
        .btn-delete { background: rgba(250, 112, 154, 0.2); color: #fa709a; }
        .btn-delete:hover { background: var(--grad-danger); color: #fff; }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .modal.active { display: flex; justify-content: center; align-items: center; padding: 20px; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.3s ease;
        }

        .modal-header { margin-bottom: 20px; }
        .modal-header h2 { font-size: 18px; font-weight: 700; }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            transition: var(--transition);
        }

        .close-btn:hover { background: rgba(255, 255, 255, 0.1); transform: rotate(90deg); }

        .form-group { margin-bottom: 16px; }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font: 500 10px 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-group input,
        .form-group select,
        .filter-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font: 12px 'Inter', sans-serif;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-actions { display: flex; gap: 8px; margin-top: 20px; }
        .form-actions button { flex: 1; }

        .icon-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            max-height: 150px;
            overflow-y: auto;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .icon-option {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .icon-option:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        .icon-option.selected { background: var(--grad-primary); color: #fff; }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 28px;
            height: 28px;
            border: 2px solid transparent;
            border-radius: 6px;
            cursor: pointer;
            transition: var(--transition);
        }

        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .kpi-unified {
            padding: 0;
            margin-bottom: 20px;
            animation: fadeInUp 0.5s ease;
            overflow: hidden;
        }

        .kpi-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.05) 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .kpi-header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .kpi-header-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .kpi-header-info h3 {
            font: 600 13px 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .kpi-header-info span {
            font: 400 10px 'Inter', sans-serif;
            color: var(--text-secondary);
        }

        .kpi-month-badge {
            background: rgba(255, 255, 255, 0.08);
            padding: 5px 12px;
            border-radius: 15px;
            font: 500 11px 'Inter', sans-serif;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .kpi-month-badge i { font-size: 10px; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            padding: 0;
        }

        .kpi-item {
            padding: 16px 20px;
            position: relative;
            transition: var(--transition);
            border-right: 1px solid var(--border);
        }

        .kpi-item:last-child { border-right: none; }

        .kpi-item::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: var(--transition);
        }

        .kpi-item.balance::before { background: var(--grad-primary); }
        .kpi-item.savings::before { background: var(--grad-dark); }

        .kpi-item:hover { background: rgba(255, 255, 255, 0.02); }
        .kpi-item:hover::before { opacity: 1; }

        .kpi-item-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .kpi-item-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kpi-item-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .kpi-item.balance .kpi-item-icon { background: var(--grad-primary); }
        .kpi-item.savings .kpi-item-icon { background: var(--grad-dark); }

        .kpi-item-name {
            font: 600 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .kpi-item-trend {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 10px;
            font: 600 9px 'Inter', sans-serif;
        }

        .kpi-item-trend.up { background: rgba(0, 242, 254, 0.1); color: #00f2fe; }
        .kpi-item-trend.down { background: rgba(250, 112, 154, 0.1); color: #fa709a; }

        .kpi-item-value {
            font: 700 24px 'Inter', sans-serif;
            letter-spacing: -1px;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .kpi-item.balance .kpi-item-value {
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-item-sub {
            font: 400 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .kpi-item-sub strong { color: var(--text-primary); font-weight: 600; }
        .kpi-item-sub.positive { color: #00f2fe; }
        .kpi-item-sub.negative { color: #fa709a; }

        .balance-sources {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255,255,255,0.08);
        }

        .balance-source {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 8px;
            background: rgba(255,255,255,0.02);
            border-radius: 6px;
            transition: var(--transition);
            cursor: pointer;
        }

        .balance-source:hover { background: rgba(255,255,255,0.05); }

        .balance-source-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .balance-source-icon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: white;
        }

        .balance-source-icon.bank { background: var(--grad-primary); }
        .balance-source-icon.shares { background: var(--grad-gold); }

        .balance-source-name {
            font: 500 9px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .balance-source-value {
            font: 600 10px 'Inter', sans-serif;
            color: var(--text-primary);
        }

        .balance-source-value.positive { color: #00f2fe; }
        .balance-source-value.negative { color: #fa709a; }

        .kpi-item.income-expense-wrapper {
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .income-expense-container {
            display: flex;
            flex-direction: row;
            flex: 1;
        }

        .ie-column {
            flex: 1;
            padding: 16px 20px;
            position: relative;
            transition: var(--transition);
        }

        .ie-column:first-child {
            border-right: 1px solid var(--border);
        }

        .ie-column::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            opacity: 0;
            transition: var(--transition);
        }

        .ie-column.income::before { background: var(--grad-success); }
        .ie-column.expense::before { background: var(--grad-danger); }

        .ie-column:hover { background: rgba(255, 255, 255, 0.02); }
        .ie-column:hover::before { opacity: 1; }

        .ie-column-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .ie-column-label {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ie-column-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }

        .ie-column.income .ie-column-icon { background: var(--grad-success); }
        .ie-column.expense .ie-column-icon { background: var(--grad-danger); }

        .ie-column-name {
            font: 600 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .ie-column-trend {
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 3px 8px;
            border-radius: 10px;
            font: 600 9px 'Inter', sans-serif;
        }

        .ie-column-trend.up { background: rgba(0, 242, 254, 0.1); color: #00f2fe; }
        .ie-column-trend.down { background: rgba(250, 112, 154, 0.1); color: #fa709a; }

        .ie-column-value {
            font: 700 26px 'Inter', sans-serif;
            letter-spacing: -1px;
            margin-bottom: 6px;
        }

        .ie-column.income .ie-column-value { color: #00f2fe; }
        .ie-column.expense .ie-column-value { color: #fa709a; }

        .ie-column-sub {
            font: 400 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .ie-column-sub strong { color: var(--text-primary); font-weight: 600; }

        .ie-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .ie-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s ease;
        }

        .ie-column.income .ie-progress-fill { background: var(--grad-success); }
        .ie-column.expense .ie-progress-fill { background: var(--grad-danger); }

        .kpi-mini-progress {
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .kpi-mini-progress-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 1s ease;
        }

        .kpi-item.balance .kpi-mini-progress-fill { background: var(--grad-primary); }
        .kpi-item.savings .kpi-mini-progress-fill { background: var(--grad-dark); }

        .chart-section {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-container {
            padding: 20px;
            animation: fadeInUp 0.6s ease;
        }

        .chart-header { margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }

        .chart-title {
            font: 600 14px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .chart-title i { 
            background: var(--grad-primary); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 16px;
        }

        .chart-subtitle {
            font: 400 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .time-filter {
            display: flex;
            gap: 2px;
            background: rgba(255, 255, 255, 0.03);
            padding: 2px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .time-filter button {
            padding: 5px 12px;
            border: none;
            background: transparent;
            border-radius: 5px;
            cursor: pointer;
            font: 500 10px 'Inter', sans-serif;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .time-filter button.active {
            background: var(--grad-primary);
            color: #fff;
        }

        .time-filter button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .section-card {
            padding: 20px;
            animation: fadeInUp 0.7s ease;
        }

        .section-header { margin-bottom: 14px; }

        .section-title {
            font: 600 14px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-title i { 
            background: var(--grad-primary); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        .month-indicator {
            background: var(--grad-primary);
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font: 600 10px 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .insight-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .insight-item:hover { background: rgba(255, 255, 255, 0.04); transform: translateX(4px); }
        .insight-item:last-child { margin-bottom: 0; }

        .insight-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            flex-shrink: 0;
            font-size: 14px;
        }

        .insight-content h4 { font: 600 12px 'Inter', sans-serif; margin-bottom: 2px; }
        .insight-content p { color: var(--text-secondary); font-size: 11px; }

        .goal-item {
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: var(--transition);
        }

        .goal-item:hover { background: rgba(255, 255, 255, 0.04); }
        .goal-item:last-child { margin-bottom: 0; }
        .goal-header { margin-bottom: 8px; }
        .goal-name { font: 600 12px 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; }
        .goal-amount { font: 500 11px 'Inter', sans-serif; color: var(--text-secondary); }

        .progress-bar {
            height: 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--grad-success);
            border-radius: 6px;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(102, 126, 234, 0.3); border-radius: 10px; }

</head>
<body>
    <div class="dashboard">

            <div class="month-selector">
                <button onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>

                <button onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
                <button onclick="goToCurrentMonth()" class="btn btn-sm btn-secondary"><i class="fas fa-calendar-day"></i></button>
            </div>
            
            <div class="flex-gap">
                <button class="btn btn-secondary" onclick="exportReport()"><i class="fas fa-download"></i>Export</button>
                <button class="btn btn-primary" onclick="openModal('transaction')"><i class="fas fa-plus"></i>Add</button>
            </div>
        </header>

        <section class="kpi-unified glass" id="kpiSection"></section>

        <section class="chart-section">
            <div class="chart-container glass">
                <div class="chart-header flex-between">
                    <div>
                        <h3 class="chart-title"><i class="fas fa-chart-bar"></i>Income vs Expenses</h3>
                        <p class="chart-subtitle" id="chartSubtitle">Daily view</p>

                        <button class="active" data-period="daily" onclick="switchChartView('daily')">Daily</button>
                        <button data-period="monthly" onclick="switchChartView('monthly')">Monthly</button>
                        <button data-period="yearly" onclick="switchChartView('yearly')">Yearly</button>
                    </div>
                </div>
                <canvas id="mainChart"></canvas>
            </div>
            
            <div class="chart-container glass">
                <div class="chart-header">
                    <h3 class="chart-title"><i class="fas fa-chart-pie"></i>Expense Breakdown</h3>
                </div>
                <canvas id="expenseBreakdownChart"></canvas>
            </div>
        </section>

        <section class="two-columns">
            <div class="section-card glass">
                <div class="section-header flex-between">
                    <h3 class="section-title"><i class="fas fa-lightbulb"></i>Insights</h3>
                </div>
                <div id="insightsContainer"></div>
            </div>
            
            <div class="section-card glass" id="goalsContainer"></div>
        </section>

        <section class="section-card glass" style="margin-bottom:20px">
            <div class="section-header flex-between">
                <h3 class="section-title"><i class="fas fa-wallet"></i>Budget</h3>
                <span style="font-size:10px;color:var(--text-secondary)" id="budgetMonth"></span>
            </div>
            <div class="budget-grid" id="budgetGrid"></div>
        </section>

        <section class="table-container glass">
            <div class="table-header-row">
                <div class="table-title-area">
                    <h3 class="section-title"><i class="fas fa-list"></i>Transactions</h3>
                    <span class="month-indicator" id="txMonthIndicator">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="txMonthName">January 2025</span>
                    </span>
                    <span class="transaction-count" id="txCount">0 transactions</span>
                </div>
            </div>
            <div class="table-controls flex-between">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search...">
                    <i class="fas fa-search"></i>
                </div>
                <div class="flex-gap">
                    <select class="filter-select" id="categoryFilter">
                        <option value="all">All Categories</option>
                    </select>
                    <select class="filter-select" id="typeFilter">
                        <option value="all">All</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th></th></tr>
                </thead>
                <tbody id="transactionBody"></tbody>
            </table>
        </section>
    </div>

    <div id="transactionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header flex-between">
                <h2 class="gradient-text">Add Transaction</h2>
                <button class="close-btn" onclick="closeModal('transaction')">&times;</button>
            </div>
            <form id="transactionForm">
                <div class="form-group"><label>Date</label><input type="date" id="txDate" required></div>
                <div class="form-group"><label>Description</label><input type="text" id="txDesc" placeholder="e.g., Grocery" required></div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="txCategory" required></select>
                </div>
                <div class="form-group">
                    <label>Type</label>
                    <select id="txType" required>
                        <option value="">Select</option>
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-group"><label>Amount (₹)</label><input type="number" id="txAmount" placeholder="5000" min="1" required></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('transaction')">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i>Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="goalModal" class="modal">
        <div class="modal-content">
            <div class="modal-header flex-between">
                <h2 class="gradient-text">Add Goal</h2>
                <button class="close-btn" onclick="closeModal('goal')">&times;</button>
            </div>
            <form id="goalForm">
                <div class="form-group"><label>Goal Name</label><input type="text" id="goalName" placeholder="e.g., New Car" required></div>
                <div class="form-group"><label>Target</label><input type="number" id="goalTarget" placeholder="500000" required></div>
                <div class="form-group"><label>Saved</label><input type="number" id="goalSaved" placeholder="100000" required></div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('goal')">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i>Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="balanceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header flex-between">
                <h2 class="gradient-text">Edit Balance Sources</h2>
                <button class="close-btn" onclick="closeModal('balance')">&times;</button>
            </div>
            <form id="balanceForm">
                <div class="form-group">
                    <label><i class="fas fa-university"></i> Bank Account</label>
                    <input type="number" id="bankBalance" placeholder="e.g., 50000" min="0">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-chart-line"></i> Share Market</label>
                    <input type="number" id="shareBalance" placeholder="e.g., 25000">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('balance')">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i>Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="budgetModal" class="modal">
        <div class="modal-content">
            <div class="modal-header flex-between">
                <h2 class="gradient-text" id="budgetModalTitle">Add Budget</h2>
                <button class="close-btn" onclick="closeModal('budget')">&times;</button>
            </div>
            <form id="budgetForm">
                <input type="hidden" id="budgetId">
                <div class="form-group">
                    <label>Category Name</label>
                    <input type="text" id="budgetName" placeholder="e.g., Food, Transport" required>
                </div>
                <div class="form-group">
                    <label>Budget Amount (₹)</label>
                    <input type="number" id="budgetAmount" placeholder="e.g., 15000" min="100" required>
                </div>
                <div class="form-group">
                    <label>Icon</label>
                    <div class="icon-picker" id="iconPicker"></div>
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker" id="colorPicker"></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('budget')">Cancel</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i>Save</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast" class="toast glass flex-center">
        <div class="toast-icon toast-success flex-center"><i class="fas fa-check"></i></div>
        <div class="toast-message"></div>
    </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({
    apiKey: "AIzaSyBMp881TtdVKp3OYG1Wp4nGc_QuL14Bn2c",
    authDomain: "personal-finance-dashboa-c6283.firebaseapp.com",
    projectId: "personal-finance-dashboa-c6283",
    storageBucket: "personal-finance-dashboa-c6283.firebasestorage.app",
    messagingSenderId: "1082785921001",
    appId: "1:1082785921001:web:94da7c3a8f648141fd7d78"
});

const db = getFirestore(app);
const $ = id => document.getElementById(id);

let selectedMonth = new Date().toISOString().slice(0, 7);
let selectedChartView = 'daily';
let allTransactions = [];
let allBudgets = [];
let expenseChart = null, mainChart = null;
let balanceSources = { bank: 0, shares: 0 };
let selectedIcon = 'fa-wallet';
let selectedColor = 'var(--grad-primary)';

const defaultBudgets = [
    { name: 'Food', icon: 'fa-utensils', color: 'var(--grad-danger)', budget: 15000 },
    { name: 'Rent', icon: 'fa-home', color: 'var(--grad-primary)', budget: 4500 },
    { name: 'Petrol', icon: 'fa-gas-pump', color: 'var(--grad-orange)', budget: 2000 },
    { name: 'Bills', icon: 'fa-file-invoice', color: 'var(--grad-info)', budget: 7500 },
    { name: 'Entertainment', icon: 'fa-film', color: 'var(--grad-pink)', budget: 5000 },
    { name: 'Healthcare', icon: 'fa-heart', color: 'var(--grad-success)', budget: 5000 },
    { name: 'Gym', icon: 'fa-dumbbell', color: 'var(--grad-purple)', budget: 1000 },
    { name: 'Gym Protein', icon: 'fa-blender', color: 'var(--grad-green)', budget: 2000 },
    { name: 'Gym Diet', icon: 'fa-apple-alt', color: 'var(--grad-dark)', budget: 2000 }
];

const availableIcons = [
    'fa-utensils', 'fa-home', 'fa-gas-pump', 'fa-file-invoice', 'fa-film', 'fa-heart',
    'fa-dumbbell', 'fa-blender', 'fa-apple-alt', 'fa-car', 'fa-plane', 'fa-shopping-bag',
    'fa-gift', 'fa-book', 'fa-graduation-cap', 'fa-baby', 'fa-dog', 'fa-coffee',
    'fa-pizza-slice', 'fa-glass-cheers', 'fa-tshirt', 'fa-mobile-alt', 'fa-laptop',
    'fa-gamepad', 'fa-music', 'fa-palette', 'fa-tools', 'fa-wrench', 'fa-plug',
    'fa-lightbulb', 'fa-wifi', 'fa-tv', 'fa-couch', 'fa-bed', 'fa-bath',
    'fa-broom', 'fa-spray-can', 'fa-cut', 'fa-medkit', 'fa-pills', 'fa-syringe',
    'fa-tooth', 'fa-glasses', 'fa-bus', 'fa-bicycle', 'fa-motorcycle', 'fa-train',
    'fa-wallet', 'fa-piggy-bank', 'fa-coins', 'fa-credit-card', 'fa-money-bill',
    'fa-briefcase', 'fa-building', 'fa-store', 'fa-shopping-cart', 'fa-tags',
    'fa-percent', 'fa-receipt', 'fa-calculator', 'fa-chart-line', 'fa-university'
];

const availableColors = [
    'var(--grad-primary)', 'var(--grad-success)', 'var(--grad-danger)', 'var(--grad-warning)',
    'var(--grad-info)', 'var(--grad-dark)', 'var(--grad-pink)', 'var(--grad-orange)',
    'var(--grad-green)', 'var(--grad-purple)', 'var(--grad-gold)'
];

const colorMap = {
    'Food': '#fa709a', 'Rent': '#667eea', 'Petrol': '#f5af19', 'Bills': '#a8edea',
    'Entertainment': '#f093fb', 'Healthcare': '#4facfe', 'Gym': '#8E2DE2',
    'Gym Protein': '#38ef7d', 'Gym Diet': '#30cfd0', 'Other': '#a0a0b8',
    'Salary': '#00f2fe', 'Freelance': '#00f2fe'
};

const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

const formatCurrency = n => `₹${n.toLocaleString('en-IN')}`;
const formatShort = n => {
    if (Math.abs(n) >= 100000) return `₹${(n/100000).toFixed(1)}L`;
    if (Math.abs(n) >= 1000) return `₹${(n/1000).toFixed(1)}K`;
    return `₹${n}`;
};
const formatMonthYear = m => new Date(m + '-01').toLocaleDateString('en-IN', { month: 'short', year: 'numeric' });
const formatMonthFull = m => new Date(m + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
const getMonth = d => d.slice(0, 7);
const getYear = d => d.slice(0, 4);
const getDays = m => new Date(m.split('-')[0], m.split('-')[1], 0).getDate();

function initPickers() {
    const iconPicker = $('iconPicker');
    const colorPicker = $('colorPicker');
    
    iconPicker.innerHTML = availableIcons.map(icon => `
        <button type="button" class="icon-option ${icon === selectedIcon ? 'selected' : ''}" data-icon="${icon}" onclick="selectIcon('${icon}')">
            <i class="fas ${icon}"></i>
        </button>
    `).join('');
    
    colorPicker.innerHTML = availableColors.map(color => `
        <div class="color-option ${color === selectedColor ? 'selected' : ''}" data-color="${color}" style="background:${color}" onclick="selectColor('${color}')"></div>
    `).join('');
}

window.selectIcon = icon => {
    selectedIcon = icon;
    document.querySelectorAll('.icon-option').forEach(el => el.classList.toggle('selected', el.dataset.icon === icon));
};

window.selectColor = color => {
    selectedColor = color;
    document.querySelectorAll('.color-option').forEach(el => el.classList.toggle('selected', el.dataset.color === color));
};

async function loadBalanceSources() {
    try {
        const docSnap = await getDoc(doc(db, "settings", "balanceSources"));
        if (docSnap.exists()) balanceSources = docSnap.data();
    } catch (e) { console.log("No balance sources"); }
}

async function saveBalanceSources() {
    await setDoc(doc(db, "settings", "balanceSources"), balanceSources);
}

async function loadBudgets() {
    const snap = await getDocs(collection(db, "budgets"));
    allBudgets = [];
    snap.forEach(d => allBudgets.push({ id: d.id, ...d.data() }));
    
    if (allBudgets.length === 0) {
        for (const b of defaultBudgets) {
            const docRef = await addDoc(collection(db, "budgets"), b);
            allBudgets.push({ id: docRef.id, ...b });
        }
    }
    
    updateCategoryDropdowns();
}

// KPI Card - Balance only includes Bank + Shares (NOT net income)

    const savings = income - expense;

    const iTrend = prevIncome > 0 ? Math.round(((income - prevIncome) / prevIncome) * 100) : 0;
    const eTrend = prevExpense > 0 ? Math.round(((expense - prevExpense) / prevExpense) * 100) : 0;

    const totalBudget = allBudgets.reduce((a, b) => a + (b.budget || 0), 0);
    const expensePercent = totalBudget > 0 ? Math.min((expense / totalBudget) * 100, 100) : 0;

    $('kpiSection').innerHTML = `
        <div class="kpi-header">
            <div class="kpi-header-left">

                ${formatMonthFull(selectedMonth)}

        </div>
        <div class="kpi-grid">
            <!-- Balance Column - Only Bank + Shares -->
            <div class="kpi-item balance">
                <div class="kpi-item-top">
                    <div class="kpi-item-label">
                        <div class="kpi-item-icon"><i class="fas fa-wallet"></i></div>
                        <span class="kpi-item-name">Balance</span>
                    </div>
                    <button class="btn-xs btn-secondary" onclick="openBalanceModal()" title="Edit">
                        <i class="fas fa-edit"></i>
                    </button>
                </div>
                <div class="kpi-item-value">${formatCurrency(totalBalance)}</div>
                
                <div class="balance-sources">
                    <div class="balance-source" onclick="openBalanceModal()">
                        <div class="balance-source-left">
                            <div class="balance-source-icon bank"><i class="fas fa-university"></i></div>
                            <span class="balance-source-name">Bank</span>
                        </div>
                        <span class="balance-source-value">${formatShort(balanceSources.bank || 0)}</span>
                    </div>
                    <div class="balance-source" onclick="openBalanceModal()">
                        <div class="balance-source-left">
                            <div class="balance-source-icon shares"><i class="fas fa-chart-line"></i></div>
                            <span class="balance-source-name">Shares</span>
                        </div>
                        <span class="balance-source-value ${(balanceSources.shares || 0) >= 0 ? '' : 'negative'}">${formatShort(balanceSources.shares || 0)}</span>
                    </div>
                </div>
            </div>

            <!-- Income & Expense Side by Side -->
            <div class="kpi-item income-expense-wrapper">
                <div class="income-expense-container">
                    <!-- Income (Left Column) -->
                    <div class="ie-column income">
                        <div class="ie-column-header">
                            <div class="ie-column-label">
                                <div class="ie-column-icon"><i class="fas fa-arrow-down"></i></div>
                                <span class="ie-column-name">Income</span>
                            </div>
                            <div class="ie-column-trend ${iTrend >= 0 ? 'up' : 'down'}">
                                <i class="fas fa-arrow-${iTrend >= 0 ? 'up' : 'down'}"></i>${Math.abs(iTrend)}%
                            </div>
                        </div>
                        <div class="ie-column-value">${formatCurrency(income)}</div>
                        <div class="ie-column-sub">
                            <i class="fas fa-chart-line"></i> vs last month
                        </div>
                        <div class="ie-progress">
                            <div class="ie-progress-fill" style="width:${incomePercent}%"></div>
                        </div>
                    </div>

                    <!-- Expense (Right Column) -->
                    <div class="ie-column expense">
                        <div class="ie-column-header">
                            <div class="ie-column-label">
                                <div class="ie-column-icon"><i class="fas fa-arrow-up"></i></div>
                                <span class="ie-column-name">Expense</span>
                            </div>

                                <i class="fas fa-arrow-${eTrend <= 0 ? 'down' : 'up'}"></i>${Math.abs(eTrend)}%
                            </div>
                        </div>
                        <div class="ie-column-value">${formatCurrency(expense)}</div>
                        <div class="ie-column-sub">
                            of <strong>${formatShort(totalBudget)}</strong> budget
                        </div>
                        <div class="ie-progress">
                            <div class="ie-progress-fill" style="width:${expensePercent}%"></div>

                    </div>

function renderInsights({ income, expense, spentByCategory }) {

    const items = [
        { icon: 'fa-trophy', bg: 'var(--grad-warning)', color: '#8b4513', title: top ? `Top: ${top[0]}` : 'No Data', text: top ? `${formatCurrency(top[1])} spent` : 'Add expenses' },
        { icon: savings >= 0 ? 'fa-smile' : 'fa-frown', bg: savings >= 0 ? 'var(--grad-success)' : 'var(--grad-danger)', color: '#fff', title: savings >= 0 ? 'Great!' : 'Alert', text: savings >= 0 ? `Saved ${formatCurrency(savings)}` : `Over ${formatCurrency(-savings)}` },
        { icon: 'fa-lightbulb', bg: 'var(--grad-primary)', color: '#fff', title: 'Tip', text: `${income > 0 ? Math.round((savings/income)*100) : 0}% savings rate` }
    ];
    $('insightsContainer').innerHTML = items.map(i => `
        <div class="insight-item">

            <div class="insight-content"><h4>${i.title}</h4><p>${i.text}</p></div>

}

        const rem = b.budget - s;
        return `
            <div class="budget-card">
                <div class="budget-card-actions">
                    <button class="budget-action-btn edit" onclick="openBudgetModal('${b.id}')" title="Edit">

                        ${b.name}

                <div class="budget-remaining" style="color:${rem>=0?'#00f2fe':'#fa709a'}">${rem>=0?`₹${rem.toLocaleString('en-IN')} left`:`₹${(-rem).toLocaleString('en-IN')} over`}</div>

async function loadAllTransactions() {
    const snap = await getDocs(collection(db, "transactions"));
    allTransactions = [];
    snap.forEach(d => allTransactions.push({ id: d.id, ...d.data() }));
    allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
}

const getMonthTxns = m => allTransactions.filter(t => getMonth(t.date) === m);
const getYearTxns = y => allTransactions.filter(t => getYear(t.date) === y);

function calcData(txns) {
    let income = 0, expense = 0;
    const spent = {}, daily = {};
    txns.forEach(t => {
        if (t.type === 'income') income += t.amount;
        else { expense += t.amount; spent[t.category] = (spent[t.category] || 0) + t.amount; }
        const d = +t.date.split('-')[2];
        if (!daily[d]) daily[d] = { income: 0, expense: 0 };
        daily[d][t.type] += t.amount;
    });
    return { income, expense, spentByCategory: spent, dailyData: daily };
}

function formatDate(dateStr) {
    const date = new Date(dateStr);
    return `${date.getDate()} ${monthNames[date.getMonth()]}`;
}

function renderTransactions(txns) {
    const tbody = $('transactionBody');
    $('txMonthName').textContent = formatMonthFull(selectedMonth);
    $('txCount').textContent = `${txns.length} transaction${txns.length !== 1 ? 's' : ''}`;
    
    if (!txns.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="no-data"><i class="fas fa-receipt"></i>No transactions<p>Select another month or add new</p></td></tr>`;
        return;
    }
    
    tbody.innerHTML = [...txns].sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => `
        <tr>
            <td>${formatDate(t.date)}</td>
            <td>${t.description}</td>
            <td>${t.category}</td>
            <td><span class="transaction-type type-${t.type}">${t.type}</span></td>
            <td class="amount-${t.type}">${formatCurrency(t.amount)}</td>
            <td><button class="action-btn btn-delete" onclick="deleteTx('${t.id}')"><i class="fas fa-trash"></i></button></td>
        </tr>
    `).join('');
}

function updateMainChart() {
    let labels = [], incData = [], expData = [], subtitle = '';
    
    if (selectedChartView === 'daily') {
        const txns = getMonthTxns(selectedMonth), days = getDays(selectedMonth), daily = {};
        txns.forEach(t => {
            const d = +t.date.split('-')[2];
            if (!daily[d]) daily[d] = { income: 0, expense: 0 };
            daily[d][t.type] += t.amount;
        });
        labels = Array.from({ length: days }, (_, i) => i + 1);
        incData = labels.map(d => daily[d]?.income || 0);
        expData = labels.map(d => daily[d]?.expense || 0);
        subtitle = `Daily • ${formatMonthYear(selectedMonth)}`;
    } else if (selectedChartView === 'monthly') {
        const year = selectedMonth.split('-')[0], txns = getYearTxns(year), monthly = {};
        txns.forEach(t => {
            const m = +t.date.split('-')[1];
            if (!monthly[m]) monthly[m] = { income: 0, expense: 0 };
            monthly[m][t.type] += t.amount;
        });
        labels = monthNames;
        incData = Array.from({ length: 12 }, (_, i) => monthly[i + 1]?.income || 0);
        expData = Array.from({ length: 12 }, (_, i) => monthly[i + 1]?.expense || 0);
        subtitle = `Monthly • ${year}`;
    } else {
        const yearly = {};
        allTransactions.forEach(t => {
            const y = getYear(t.date);
            if (!yearly[y]) yearly[y] = { income: 0, expense: 0 };
            yearly[y][t.type] += t.amount;
        });
        const years = Object.keys(yearly).sort();
        labels = years; incData = years.map(y => yearly[y]?.income || 0); expData = years.map(y => yearly[y]?.expense || 0);
        subtitle = `Yearly`;
    }
    
    if (mainChart) { mainChart.data.labels = labels; mainChart.data.datasets[0].data = incData; mainChart.data.datasets[1].data = expData; mainChart.update(); }
    
    $('chartSubtitle').textContent = subtitle;
}

function updateExpenseChart(spent) {
    const cats = Object.keys(spent), vals = Object.values(spent), cols = cats.map(c => colorMap[c] || '#a0a0b8');
    if (expenseChart) {
        if (cats.length) { expenseChart.data.labels = cats; expenseChart.data.datasets[0].data = vals; expenseChart.data.datasets[0].backgroundColor = cols; }
        else { expenseChart.data.labels = ['No Data']; expenseChart.data.datasets[0].data = [1]; expenseChart.data.datasets[0].backgroundColor = ['rgba(255,255,255,0.05)']; }
        expenseChart.update();
    }
}

function initCharts() {
    const opts = { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#8a8aa3', font: { family: 'Inter', size: 10 } } } } };
    mainChart = new Chart($('mainChart'), {
        type: 'bar',
        data: { labels: [], datasets: [
            { label: 'Income', data: [], backgroundColor: 'rgba(79, 172, 254, 0.7)', borderRadius: 4 },
            { label: 'Expenses', data: [], backgroundColor: 'rgba(250, 112, 154, 0.7)', borderRadius: 4 }
        ]},
        options: { ...opts, scales: { x: { ticks: { color: '#8a8aa3', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { ticks: { color: '#8a8aa3', callback: v => '₹' + v.toLocaleString('en-IN') }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
    });
    expenseChart = new Chart($('expenseBreakdownChart'), {
        type: 'doughnut',
        data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['rgba(255,255,255,0.05)'], borderWidth: 0 }] },
        options: { ...opts, cutout: '70%' }
    });
}

async function loadGoals() {

async function refreshAll() {
    const curr = getMonthTxns(selectedMonth), data = calcData(curr);
    const [y, m] = selectedMonth.split('-').map(Number);
    const prev = getMonthTxns(new Date(y, m - 2, 1).toISOString().slice(0, 7)), prevData = calcData(prev);
    
    renderKPIs(data.income, data.expense, prevData.income, prevData.expense);
    renderBudgets(data.spentByCategory);
    renderTransactions(curr);
    renderInsights(data);
    updateMainChart();
    updateExpenseChart(data.spentByCategory);
}

$('searchInput').oninput = filterTable; $('categoryFilter').onchange = filterTable; $('typeFilter').onchange = filterTable;

function filterTable() { 
    const s = $('searchInput').value.toLowerCase(), c = $('categoryFilter').value, t = $('typeFilter').value;
    let visible = 0;
    document.querySelectorAll('#transactionBody tr').forEach(r => { 
        if (r.cells.length < 5) return; 
        const match = r.textContent.toLowerCase().includes(s) && (c === 'all' || r.cells[2].textContent === c) && (t === 'all' || r.cells[3].textContent.trim().toLowerCase() === t);
        r.style.display = match ? '' : 'none';
        if (match) visible++;
    });
    const total = getMonthTxns(selectedMonth).length;
    $('txCount').textContent = (s || c !== 'all' || t !== 'all') ? `${visible} of ${total}` : `${total} transaction${total !== 1 ? 's' : ''}`;
}

    refreshAll();

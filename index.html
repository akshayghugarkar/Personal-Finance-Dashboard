<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --grad-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-success: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --grad-danger: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --grad-warning: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            --grad-info: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --grad-dark: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
            --grad-pink: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --grad-orange: linear-gradient(135deg, #f5af19 0%, #f12711 100%);
            --grad-green: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --grad-purple: linear-gradient(135deg, #8E2DE2 0%, #4A00E0 100%);
            --bg-primary: #0a0a1a;
            --bg-secondary: #12122a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #fff;
            --text-secondary: #8a8aa3;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --glow: 0 0 30px rgba(102, 126, 234, 0.3);
            --radius: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 0%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(118, 75, 162, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(79, 172, 254, 0.05) 0%, transparent 70%);
            z-index: -1;
        }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
        }

        .gradient-text {
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .flex-gap { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

        .dashboard { max-width: 1500px; margin: 0 auto; padding: 24px; }

        /* Header */
        .header {
            padding: 20px 32px;
            margin-bottom: 32px;
            animation: slideDown 0.5s ease;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i { font-size: 28px; }

        /* Month Selector */
        .month-selector {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .month-selector button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            transition: var(--transition);
            font-size: 14px;
        }

        .month-selector button:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .month-selector input[type="month"] {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font: 600 14px 'Inter', sans-serif;
            cursor: pointer;
        }

        .month-selector input[type="month"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
        }

        .month-badge {
            background: var(--grad-primary);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font: 600 13px 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font: 600 13px 'Inter', sans-serif;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-primary {
            background: var(--grad-primary);
            color: #fff;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover { box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5); }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover { background: rgba(255, 255, 255, 0.1); }

        .btn-sm { padding: 8px 14px; font-size: 12px; }

        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font: 600 11px 'Inter', sans-serif;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-edit { background: var(--grad-success); color: #fff; }
        .btn-delete { background: rgba(250, 112, 154, 0.2); color: #fa709a; }
        .btn-delete:hover { background: var(--grad-danger); color: #fff; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            animation: fadeIn 0.2s ease;
        }

        .modal.active { display: flex; justify-content: center; align-items: center; padding: 20px; }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px;
            width: 100%;
            max-width: 460px;
            box-shadow: var(--shadow), var(--glow);
            animation: slideUp 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header { margin-bottom: 28px; }
        .modal-header h2 { font-size: 22px; font-weight: 700; }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font: 500 12px 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-group input,
        .form-group select,
        .filter-select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font: 14px 'Inter', sans-serif;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus,
        .filter-select:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder { color: var(--text-secondary); opacity: 0.6; }
        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .form-actions button { flex: 1; }

        /* ========== NEW KPI SECTION ========== */
        .kpi-section {
            margin-bottom: 32px;
            animation: fadeInUp 0.5s ease;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: 1.2fr repeat(3, 1fr);
            gap: 16px;
        }

        /* Main Balance Card */
        .kpi-main {
            padding: 28px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.1) 100%);
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .kpi-main::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .kpi-main-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .kpi-main-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: var(--grad-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .kpi-main-label {
            font: 500 13px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-main-value {
            font: 800 42px 'Inter', sans-serif;
            letter-spacing: -2px;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .kpi-main-footer {
            display: flex;
            gap: 20px;
        }

        .kpi-main-stat {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font: 500 12px 'Inter', sans-serif;
        }

        .kpi-main-stat i {
            font-size: 14px;
        }

        .kpi-main-stat.positive { color: #00f2fe; }
        .kpi-main-stat.negative { color: #fa709a; }

        /* Mini KPI Cards */
        .kpi-mini {
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .kpi-mini::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            border-radius: 0 4px 4px 0;
            transition: var(--transition);
        }

        .kpi-mini.income::before { background: var(--grad-success); }
        .kpi-mini.expense::before { background: var(--grad-danger); }
        .kpi-mini.savings::before { background: var(--grad-dark); }

        .kpi-mini:hover {
            background: var(--bg-card-hover);
            transform: translateY(-4px);
        }

        .kpi-mini:hover::before {
            width: 6px;
        }

        .kpi-mini-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .kpi-mini-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .kpi-mini-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
        }

        .kpi-mini.income .kpi-mini-icon { background: var(--grad-success); }
        .kpi-mini.expense .kpi-mini-icon { background: var(--grad-danger); }
        .kpi-mini.savings .kpi-mini-icon { background: var(--grad-dark); }

        .kpi-mini-label {
            font: 500 11px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .kpi-mini-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font: 600 11px 'Inter', sans-serif;
        }

        .kpi-mini-trend.up {
            background: rgba(0, 242, 254, 0.1);
            color: #00f2fe;
        }

        .kpi-mini-trend.down {
            background: rgba(250, 112, 154, 0.1);
            color: #fa709a;
        }

        .kpi-mini-value {
            font: 700 26px 'Inter', sans-serif;
            letter-spacing: -1px;
            color: var(--text-primary);
        }

        .kpi-mini-sub {
            font: 400 12px 'Inter', sans-serif;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .kpi-mini-sub span {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* Sparkline Bar */
        .kpi-sparkline {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 24px;
            margin-top: auto;
        }

        .kpi-sparkline-bar {
            flex: 1;
            border-radius: 2px;
            min-height: 4px;
            transition: var(--transition);
        }

        .kpi-mini.income .kpi-sparkline-bar { background: rgba(0, 242, 254, 0.4); }
        .kpi-mini.expense .kpi-sparkline-bar { background: rgba(250, 112, 154, 0.4); }
        .kpi-mini.savings .kpi-sparkline-bar { background: rgba(48, 207, 208, 0.4); }

        .kpi-mini:hover .kpi-sparkline-bar {
            opacity: 0.8;
        }

        /* Chart Section */
        .chart-section {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .chart-container {
            padding: 28px;
            animation: fadeInUp 0.6s ease;
        }

        .chart-header { margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }

        .chart-title {
            font: 600 18px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title i { 
            background: var(--grad-primary); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            font-size: 20px;
        }

        .chart-subtitle {
            font: 400 12px 'Inter', sans-serif;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Time Filter Pills */
        .time-filter {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .time-filter button {
            padding: 8px 16px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font: 500 12px 'Inter', sans-serif;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .time-filter button.active {
            background: var(--grad-primary);
            color: #fff;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.4);
        }

        .time-filter button:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Chart Stats */
        .chart-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .chart-stat {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
        }

        .chart-stat .label {
            font: 500 11px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .chart-stat .value {
            font: 700 18px 'Inter', sans-serif;
            color: var(--text-primary);
        }

        /* Two Column Layout */
        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        /* Section Card */
        .section-card {
            padding: 28px;
            animation: fadeInUp 0.7s ease;
        }

        .section-header { margin-bottom: 20px; }

        .section-title {
            font: 600 18px 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i { 
            background: var(--grad-primary); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }

        /* Insights */
        .insight-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .insight-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
            transform: translateX(4px);
        }

        .insight-item:last-child { margin-bottom: 0; }

        .insight-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            flex-shrink: 0;
            font-size: 18px;
        }

        .insight-content h4 { font: 600 14px 'Inter', sans-serif; margin-bottom: 4px; }
        .insight-content p { color: var(--text-secondary); font-size: 13px; line-height: 1.5; }

        /* Goals */
        .goal-item {
            padding: 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 14px;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .goal-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
        }

        .goal-item:last-child { margin-bottom: 0; }
        .goal-header { margin-bottom: 12px; }
        .goal-name { font: 600 14px 'Inter', sans-serif; display: flex; align-items: center; gap: 10px; }
        .goal-amount { font: 500 13px 'Inter', sans-serif; color: var(--text-secondary); }

        /* Progress Bar */
        .progress-bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--grad-success);
            border-radius: 10px;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2s infinite;
        }

        /* Budget Grid */
        .budget-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .budget-card {
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid transparent;
            transition: var(--transition);
        }

        .budget-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border);
            transform: translateY(-2px);
        }

        .budget-header { margin-bottom: 14px; }
        .budget-category { display: flex; align-items: center; gap: 10px; font: 600 13px 'Inter', sans-serif; }

        .category-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            font-size: 16px;
        }

        .budget-status {
            font: 600 11px 'Inter', sans-serif;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .status-good { background: rgba(0, 242, 254, 0.15); color: #00f2fe; }
        .status-warning { background: rgba(252, 182, 159, 0.2); color: #fcb69f; }
        .status-over { background: rgba(250, 112, 154, 0.2); color: #fa709a; }

        .budget-amounts { margin-bottom: 10px; font: 500 13px 'Inter', sans-serif; }
        .budget-spent { font-weight: 700; }
        .budget-total { color: var(--text-secondary); }
        .budget-remaining { font-size: 11px; margin-top: 8px; }

        /* Table */
        .table-container {
            padding: 28px;
            margin-bottom: 32px;
            animation: fadeInUp 0.8s ease;
        }

        .table-controls { margin-bottom: 20px; gap: 12px; flex-wrap: wrap; }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 40px 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font: 14px 'Inter', sans-serif;
        }

        .search-box input::placeholder { color: var(--text-secondary); opacity: 0.6; }

        .search-box i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .filter-select {
            width: auto;
            padding: 12px 16px;
            cursor: pointer;
            min-width: 140px;
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 14px 16px;
            text-align: left;
            font: 600 11px 'Inter', sans-serif;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
        }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";

// Data

// Helpers
const formatCurrency = n => `â‚¹${n.toLocaleString('en-IN')}`;
const formatMonthYear = m => new Date(m + '-01').toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
const getMonth = d => d.slice(0, 7);
const getYear = d => d.slice(0, 4);
const getDays = m => new Date(m.split('-')[0], m.split('-')[1], 0).getDate();

// Month Navigation
window.changeMonth = delta => {
    const [y, m] = selectedMonth.split('-').map(Number);
    selectedMonth = new Date(y, m - 1 + delta, 1).toISOString().slice(0, 7);
    $('monthPicker').value = selectedMonth;
    refreshAll();
};

window.onMonthChange = () => { selectedMonth = $('monthPicker').value; refreshAll(); };

window.goToCurrentMonth = () => {

    $('monthPicker').value = selectedMonth;
    refreshAll();
    showToast("ًں“… Current month");
};

window.switchChartView = v => {
    selectedChartView = v;
    document.querySelectorAll('#chartTimeFilter button').forEach(b => b.classList.toggle('active', b.dataset.period === v));
    updateMainChart();
};

// Generate Sparkline Data
function generateSparkline(data, days = 7) {
    const result = [];
    for (let i = 0; i < days; i++) {
        result.push(data[i] || Math.random() * 50 + 10);
    }
    const max = Math.max(...result);
    return result.map(v => (v / max) * 100);
}

// Render KPIs - NEW DESIGN
function renderKPIs(income, expense, prevIncome, prevExpense, dailyData) {
    const savings = income - expense;
    const rate = income > 0 ? Math.round((savings / income) * 100) : 0;
    const iTrend = prevIncome > 0 ? Math.round(((income - prevIncome) / prevIncome) * 100) : 0;
    const eTrend = prevExpense > 0 ? Math.round(((expense - prevExpense) / prevExpense) * 100) : 0;
    const sTrend = (prevIncome - prevExpense) !== 0 ? Math.round(((savings - (prevIncome - prevExpense)) / Math.abs(prevIncome - prevExpense)) * 100) : 0;

    // Generate sparkline data from daily transactions
    const days = getDays(selectedMonth);
    const incomeSparkline = Array.from({length: 7}, (_, i) => dailyData[days - 6 + i]?.income || 0);
    const expenseSparkline = Array.from({length: 7}, (_, i) => dailyData[days - 6 + i]?.expense || 0);
    const savingsSparkline = incomeSparkline.map((v, i) => Math.max(0, v - (expenseSparkline[i] || 0)));

    const normalizeSparkline = arr => {
        const max = Math.max(...arr, 1);
        return arr.map(v => (v / max) * 100);
    };

    $('kpiSection').innerHTML = `
        <div class="kpi-container">
            <!-- Main Balance Card -->
            <div class="kpi-main glass">
                <div class="kpi-main-header">
                    <div class="kpi-main-icon"><i class="fas fa-wallet"></i></div>
                    <span class="kpi-main-label">Total Balance</span>
                </div>
                <div class="kpi-main-value">${formatCurrency(savings)}</div>
                <div class="kpi-main-footer">
                    <div class="kpi-main-stat ${savings >= 0 ? 'positive' : 'negative'}">
                        <i class="fas fa-${savings >= 0 ? 'arrow-up' : 'arrow-down'}"></i>
                        ${savings >= 0 ? 'Healthy' : 'Negative'}
                    </div>
                    <div class="kpi-main-stat positive">
                        <i class="fas fa-percent"></i>
                        ${rate}% Savings Rate
                    </div>
                    <div class="kpi-main-stat">
                        <i class="fas fa-calendar"></i>
                        ${formatMonthYear(selectedMonth)}
                    </div>
                </div>
            </div>

            <!-- Income Card -->
            <div class="kpi-mini glass income">
                <div class="kpi-mini-header">
                    <div class="kpi-mini-info">
                        <div class="kpi-mini-icon"><i class="fas fa-arrow-down"></i></div>
                        <span class="kpi-mini-label">Income</span>
                    </div>
                    <div class="kpi-mini-trend ${iTrend >= 0 ? 'up' : 'down'}">
                        <i class="fas fa-arrow-${iTrend >= 0 ? 'up' : 'down'}"></i>
                        ${Math.abs(iTrend)}%
                    </div>
                </div>
                <div class="kpi-mini-value">${formatCurrency(income)}</div>
                <div class="kpi-sparkline">
                    ${normalizeSparkline(incomeSparkline).map(h => `<div class="kpi-sparkline-bar" style="height:${Math.max(h, 8)}%"></div>`).join('')}
                </div>
            </div>

            <!-- Expense Card -->
            <div class="kpi-mini glass expense">
                <div class="kpi-mini-header">
                    <div class="kpi-mini-info">
                        <div class="kpi-mini-icon"><i class="fas fa-arrow-up"></i></div>
                        <span class="kpi-mini-label">Expenses</span>
                    </div>
                    <div class="kpi-mini-trend ${eTrend <= 0 ? 'up' : 'down'}">
                        <i class="fas fa-arrow-${eTrend <= 0 ? 'down' : 'up'}"></i>
                        ${Math.abs(eTrend)}%
                    </div>
                </div>
                <div class="kpi-mini-value">${formatCurrency(expense)}</div>
                <div class="kpi-sparkline">
                    ${normalizeSparkline(expenseSparkline).map(h => `<div class="kpi-sparkline-bar" style="height:${Math.max(h, 8)}%"></div>`).join('')}
                </div>
            </div>

            <!-- Savings Card -->
            <div class="kpi-mini glass savings">
                <div class="kpi-mini-header">
                    <div class="kpi-mini-info">
                        <div class="kpi-mini-icon"><i class="fas fa-piggy-bank"></i></div>
                        <span class="kpi-mini-label">Savings</span>
                    </div>
                    <div class="kpi-mini-trend ${sTrend >= 0 ? 'up' : 'down'}">
                        <i class="fas fa-arrow-${sTrend >= 0 ? 'up' : 'down'}"></i>
                        ${Math.abs(sTrend)}%
                    </div>
                </div>
                <div class="kpi-mini-value">${formatCurrency(savings)}</div>
                <div class="kpi-mini-sub">
                    <i class="fas fa-chart-pie"></i>
                    Rate: <span>${rate}%</span>
                </div>
            </div>
        </div>
    `;
}

// Render Insights
function renderInsights({ income, expense, spentByCategory }) {
    const savings = income - expense;
    const top = Object.entries(spentByCategory).sort((a, b) => b[1] - a[1])[0];

    const items = [
        { icon: 'fa-trophy', bg: 'var(--grad-warning)', color: '#8b4513', title: top ? `Top: ${top[0]}` : 'No Data', text: top ? `Spent ${formatCurrency(top[1])} on ${top[0]}` : 'Add expenses to see insights' },
        { icon: savings >= 0 ? 'fa-smile' : 'fa-exclamation', bg: savings >= 0 ? 'var(--grad-success)' : 'var(--grad-danger)', color: '#fff', title: savings >= 0 ? 'Great!' : 'Alert!', text: savings >= 0 ? `Saved ${formatCurrency(savings)} ًں’ھ` : `Over by ${formatCurrency(-savings)}` },
        { icon: 'fa-lightbulb', bg: 'var(--grad-primary)', color: '#fff', title: 'Tip', text: income > 0 ? `Savings rate: ${Math.round((savings/income)*100)}%` : 'Add income to track' }

    $('insightsContainer').innerHTML = items.map(i => `

// Render Budgets
function renderBudgets(spent) {
    $('budgetMonth').textContent = formatMonthYear(selectedMonth);
    $('budgetGrid').innerHTML = budgetData.map(b => {
        const s = spent[b.name] || 0;
        const pct = b.budget > 0 ? Math.round((s / b.budget) * 100) : 0;
        const status = pct > 100 ? 'over' : pct > 80 ? 'warning' : 'good';
        const rem = b.budget - s;
        return `
            <div class="budget-card">
                <div class="budget-header flex-between">
                    <div class="budget-category">
                        <div class="category-icon flex-center" style="background:${b.bg}"><i class="fas ${b.icon}" style="color:#fff"></i></div>
                        ${b.name}
                    </div>
                    <span class="budget-status status-${status}">${pct}%</span>
                </div>
                <div class="budget-amounts flex-between">
                    <span class="budget-spent">${formatCurrency(s)}</span>
                    <span class="budget-total">/ ${formatCurrency(b.budget)}</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${status==='over'?'var(--grad-danger)':status==='warning'?'var(--grad-warning)':'var(--grad-success)'}"></div></div>
                <div class="budget-remaining" style="color:${rem>=0?'#00f2fe':'#fa709a'}">${rem>=0?`â‚¹${rem.toLocaleString('en-IN')} left`:`â‚¹${(-rem).toLocaleString('en-IN')} over`}</div>
            </div>
        `;
    }).join('');
}

// Load Transactions
async function loadAllTransactions() {
    const snap = await getDocs(collection(db, "transactions"));
    allTransactions = [];
    snap.forEach(d => allTransactions.push({ id: d.id, ...d.data() }));
    allTransactions.sort((a, b) => new Date(b.date) - new Date(a.date));
}

const getMonthTxns = m => allTransactions.filter(t => getMonth(t.date) === m);
const getYearTxns = y => allTransactions.filter(t => getYear(t.date) === y);

function calcData(txns) {
    let income = 0, expense = 0;
    const spent = {}, daily = {};
    txns.forEach(t => {
        if (t.type === 'income') income += t.amount;
        else { expense += t.amount; spent[t.category] = (spent[t.category] || 0) + t.amount; }
        const d = +t.date.split('-')[2];
        if (!daily[d]) daily[d] = { income: 0, expense: 0 };
        daily[d][t.type] += t.amount;
    });
    return { income, expense, spentByCategory: spent, dailyData: daily };
}

// Render Transactions
function renderTransactions(txns) {
    const tbody = $('transactionBody');
    if (!txns.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="no-data"><i class="fas fa-receipt"></i>No transactions</td></tr>`;
        return;
    }
    tbody.innerHTML = txns.map(t => `
        <tr>
            <td>${t.date}</td>
            <td>${t.description}</td>
            <td>${t.category}</td>
            <td><span class="transaction-type type-${t.type}">${t.type}</span></td>
            <td class="amount-${t.type}">${formatCurrency(t.amount)}</td>
            <td><button class="action-btn btn-delete" onclick="deleteTx('${t.id}')">Delete</button></td>
        </tr>
    `).join('');
}

// Charts
function updateMainChart() {
    let labels = [], incData = [], expData = [], totalIn = 0, totalEx = 0, subtitle = '';

    if (selectedChartView === 'daily') {
        const txns = getMonthTxns(selectedMonth);
        const days = getDays(selectedMonth);
        const daily = {};
        txns.forEach(t => {
            const d = +t.date.split('-')[2];
            if (!daily[d]) daily[d] = { income: 0, expense: 0 };
            daily[d][t.type] += t.amount;
            t.type === 'income' ? totalIn += t.amount : totalEx += t.amount;
        });
        labels = Array.from({ length: days }, (_, i) => i + 1);
        incData = labels.map(d => daily[d]?.income || 0);
        expData = labels.map(d => daily[d]?.expense || 0);
        subtitle = `Daily â€¢ ${formatMonthYear(selectedMonth)}`;
    } else if (selectedChartView === 'monthly') {
        const year = selectedMonth.split('-')[0];
        const txns = getYearTxns(year);
        const monthly = {};
        txns.forEach(t => {
            const m = +t.date.split('-')[1];
            if (!monthly[m]) monthly[m] = { income: 0, expense: 0 };
            monthly[m][t.type] += t.amount;
            t.type === 'income' ? totalIn += t.amount : totalEx += t.amount;
        });
        labels = monthNames;
        incData = Array.from({ length: 12 }, (_, i) => monthly[i + 1]?.income || 0);
        expData = Array.from({ length: 12 }, (_, i) => monthly[i + 1]?.expense || 0);
        subtitle = `Monthly â€¢ ${year}`;
    } else {
        const yearly = {};
        allTransactions.forEach(t => {
            const y = getYear(t.date);
            if (!yearly[y]) yearly[y] = { income: 0, expense: 0 };
            yearly[y][t.type] += t.amount;
            t.type === 'income' ? totalIn += t.amount : totalEx += t.amount;
        });
        const years = Object.keys(yearly).sort();
        labels = years;
        incData = years.map(y => yearly[y]?.income || 0);
        expData = years.map(y => yearly[y]?.expense || 0);
        subtitle = `Yearly â€¢ ${years[0] || ''} - ${years.slice(-1)[0] || ''}`;
    }

    if (mainChart) {
        mainChart.data.labels = labels;
        mainChart.data.datasets[0].data = incData;
        mainChart.data.datasets[1].data = expData;
        mainChart.update();
    }

    $('chartSubtitle').textContent = subtitle;
    $('chartTotalIncome').textContent = formatCurrency(totalIn);
    $('chartTotalExpense').textContent = formatCurrency(totalEx);
    const net = totalIn - totalEx;
    $('chartNetSavings').textContent = `${net >= 0 ? '+' : ''}${formatCurrency(net)}`;
    $('chartNetSavings').style.color = net >= 0 ? '#00f2fe' : '#fa709a';
}

function updateExpenseChart(spent) {
    const cats = Object.keys(spent), vals = Object.values(spent);
    const cols = cats.map(c => colorMap[c] || '#a0a0b8');
    if (expenseChart) {
        if (cats.length) {
            expenseChart.data.labels = cats;
            expenseChart.data.datasets[0].data = vals;
            expenseChart.data.datasets[0].backgroundColor = cols;
        } else {
            expenseChart.data.labels = ['No Data'];
            expenseChart.data.datasets[0].data = [1];
            expenseChart.data.datasets[0].backgroundColor = ['rgba(255,255,255,0.05)'];
        }
        expenseChart.update();
    }
}

function initCharts() {
    const opts = {
        responsive: true,
        maintainAspectRatio: true,
        plugins: { legend: { labels: { color: '#8a8aa3', font: { family: 'Inter', size: 12 } } } }
    };

    mainChart = new Chart($('mainChart'), {
        type: 'bar',
        data: {
            labels: [],
            datasets: [
                { label: 'Income', data: [], backgroundColor: 'rgba(79, 172, 254, 0.7)', borderRadius: 6, borderSkipped: false },
                { label: 'Expenses', data: [], backgroundColor: 'rgba(250, 112, 154, 0.7)', borderRadius: 6, borderSkipped: false }
            ]
        },
        options: {
            ...opts,
            scales: {
                x: { ticks: { color: '#8a8aa3', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.03)' } },
                y: { ticks: { color: '#8a8aa3', callback: v => 'â‚¹' + v.toLocaleString('en-IN') }, grid: { color: 'rgba(255,255,255,0.03)' } }
            },
            plugins: { ...opts.plugins, tooltip: { callbacks: { label: c => `${c.dataset.label}: â‚¹${c.raw.toLocaleString('en-IN')}` } } }
        }
    });

    expenseChart = new Chart($('expenseBreakdownChart'), {
        type: 'doughnut',
        data: { labels: ['No Data'], datasets: [{ data: [1], backgroundColor: ['rgba(255,255,255,0.05)'], borderWidth: 0 }] },
        options: { ...opts, cutout: '70%', plugins: { ...opts.plugins, tooltip: { callbacks: { label: c => `${c.label}: â‚¹${c.raw.toLocaleString('en-IN')}` } } } }
    });
}

// Goals
async function loadGoals() {
    const snap = await getDocs(collection(db, "goals"));
    const c = $('goalsContainer');
    c.innerHTML = `<div class="section-header flex-between"><h3 class="section-title"><i class="fas fa-bullseye"></i>Savings Goals</h3><button class="btn btn-sm btn-primary" onclick="openModal('goal')"><i class="fas fa-plus"></i></button></div>`;
    
    if (snap.empty) { c.innerHTML += `<div class="no-data"><i class="fas fa-flag"></i>No goals yet</div>`; return; }
    
    snap.forEach(d => {
        const g = d.data(), pct = Math.round((g.saved / g.target) * 100);
        c.innerHTML += `
            <div class="goal-item">
                <div class="goal-header flex-between">
                    <div class="goal-name"><i class="fas fa-flag" style="color:#667eea"></i>${g.name}</div>
                    <div class="goal-amount">${formatCurrency(g.saved)} / ${formatCurrency(g.target)}</div>
                </div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%"></div></div>
                <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px">
                    <span style="color:var(--text-secondary)">${pct >= 100 ? 'âœ… Done!' : `${pct}%`}</span>
                    <div class="flex-gap">
                        <button class="action-btn btn-edit" onclick="editGoal('${d.id}','${g.name}',${g.target},${g.saved})">Edit</button>
                        <button class="action-btn btn-delete" onclick="deleteGoal('${d.id}')">Delete</button>
                    </div>
                </div>
            </div>
        `;
    });
}

// Refresh All
async function refreshAll() {
    const curr = getMonthTxns(selectedMonth), data = calcData(curr);
    const [y, m] = selectedMonth.split('-').map(Number);
    const prev = getMonthTxns(new Date(y, m - 2, 1).toISOString().slice(0, 7)), prevData = calcData(prev);
    
    renderKPIs(data.income, data.expense, prevData.income, prevData.expense, data.dailyData);
    renderBudgets(data.spentByCategory);
    renderTransactions(curr);
    renderInsights(data);
    updateMainChart();
    updateExpenseChart(data.spentByCategory);
}

// Event Handlers
window.openModal = t => $(`${t}Modal`).classList.add('active');
window.closeModal = t => $(`${t}Modal`).classList.remove('active');

window.showToast = msg => {
    const t = $('toast');
    t.querySelector('.toast-message').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
};

window.deleteTx = async id => {
    if (!confirm('Delete?')) return;
    await deleteDoc(doc(db, "transactions", id));
    showToast("ًں—‘ï¸ڈ Deleted");
    await loadAllTransactions();
    refreshAll();
};

window.deleteGoal = async id => {
    if (!confirm('Delete?')) return;
    await deleteDoc(doc(db, "goals", id));
    showToast("ًں—‘ï¸ڈ Deleted");
    loadGoals();
};

window.editGoal = async (id, name, target, saved) => {
    const n = prompt("Name:", name); if (!n) return;
    const t = prompt("Target:", target), s = prompt("Saved:", saved);
    if (!t || !s) return;
    await updateDoc(doc(db, "goals", id), { name: n, target: +t, saved: +s });
    showToast("âœ… Updated");
    loadGoals();
};

window.exportReport = () => {
    const txns = getMonthTxns(selectedMonth);
    const csv = [['Date','Description','Category','Type','Amount'], ...txns.map(t => [t.date, t.description, t.category, t.type, t.amount])].map(r => r.join(',')).join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = `report-${selectedMonth}.csv`;
    a.click();
    showToast("ًں“ٹ Downloaded");
};

// Forms
$('transactionForm').onsubmit = async e => {
    e.preventDefault();
    const data = { date: $('txDate').value, description: $('txDesc').value, category: $('txCategory').value, type: $('txType').value, amount: +$('txAmount').value, createdAt: new Date().toISOString() };
    await addDoc(collection(db, "transactions"), data);
    closeModal('transaction');
    $('transactionForm').reset();
    $('txDate').valueAsDate = new Date();
    showToast("âœ… Added");
    await loadAllTransactions();
    const m = getMonth(data.date);
    if (m !== selectedMonth) { selectedMonth = m; $('monthPicker').value = m; }
    refreshAll();
};

$('goalForm').onsubmit = async e => {
    e.preventDefault();
    await addDoc(collection(db, "goals"), { name: $('goalName').value, target: +$('goalTarget').value, saved: +$('goalSaved').value, createdAt: new Date().toISOString() });
    closeModal('goal');
    $('goalForm').reset();
    showToast("ًںژ¯ Goal added");
    loadGoals();
};

// Filters
$('searchInput').oninput = filterTable;
$('categoryFilter').onchange = filterTable;
$('typeFilter').onchange = filterTable;

function filterTable() {
    const s = $('searchInput').value.toLowerCase(), c = $('categoryFilter').value, t = $('typeFilter').value;
    document.querySelectorAll('#transactionBody tr').forEach(r => {
        if (r.cells.length < 5) return;
        const match = r.textContent.toLowerCase().includes(s) && (c === 'all' || r.cells[2].textContent === c) && (t === 'all' || r.cells[3].textContent.trim().toLowerCase() === t);
        r.style.display = match ? '' : 'none';
    });
}

// Init
window.onload = async () => {
    $('monthPicker').value = selectedMonth;
    $('txDate').valueAsDate = new Date();
    initCharts();
    await loadAllTransactions();
    refreshAll();
    loadGoals();
};
</script>
</body>
</html>
